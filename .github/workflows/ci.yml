name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    env:
      OMPI_ALLOW_RUN_AS_ROOT: 1
      OMPI_ALLOW_RUN_AS_ROOT_CONFIRM: 1
      OMP_NUM_THREADS: 1

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            gfortran \
            libopenmpi-dev openmpi-bin \
            libopenblas-dev \
            libfftw3-dev

      - name: Cache QE 7.5 build
        id: cache-qe
        uses: actions/cache@v4
        with:
          path: ~/q-e
          # Cache is keyed to QE version + OS + this workflow file.
          # Bump the suffix (v1, v2, …) to force a full rebuild.
          key: qe-7.5-${{ runner.os }}-gfortran-v1

      - name: Download and build QE 7.5
        if: steps.cache-qe.outputs.cache-hit != 'true'
        run: |
          wget -q \
            https://gitlab.com/QEF/q-e/-/archive/qe-7.5/q-e-qe-7.5.tar.gz
          tar xf q-e-qe-7.5.tar.gz
          mv q-e-qe-7.5 ~/q-e
          cd ~/q-e
          ./configure --with-scalapack=no MPIF90=mpif90
          make -j$(nproc) all

      - name: Configure QE-CONVERSE
        run: ./configure --with-qe-source=$HOME/q-e

      - name: Build QE-CONVERSE
        run: make -j$(nproc)

      - name: Run tests
        run: make test
